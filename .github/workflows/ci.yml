name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt in to what they need.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AUTH_TRUST_HOST: "true"
      # dummy 32-byte key for CI only
      MFA_ENC_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # security invariants (Founder Trust Model, tokens, lockout, crypto)
      - run: npx prisma db push
        working-directory: apps/web
      - run: npx tsx scripts/test-phase21.mts
        working-directory: apps/web
      - run: npm run build
      # privacy promise, machine-enforced: no third-party trackers in output
      - run: node scripts/check-trackers.mjs

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # High/critical vulnerabilities block merge (SECURITY-NOTES.md policy).
      - run: npm audit --audit-level=high

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
