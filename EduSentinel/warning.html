<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSentinel AI — Dangerous Site Blocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #ff2d2d;
      --red-glow:  rgba(255, 45, 45, 0.25);
      --red-soft:  rgba(255, 45, 45, 0.08);
      --ink:       #0d0d0d;
      --ink-2:     #1a1a1a;
      --muted:     #6b6b6b;
      --border:    rgba(255,255,255,0.06);
      --safe-bg:   #0f1a0f;
      --safe:      #3ddc84;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }

    body::after {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,45,45,0.12) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1);   }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12); }
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    .shield-wrap {
      position: relative;
      margin-bottom: 32px;
      animation: drop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes drop-in {
      from { opacity: 0; transform: translateY(-30px) scale(0.8); }
      to   { opacity: 1; transform: translateY(0)     scale(1);   }
    }

    .shield-icon {
      width: 88px; height: 88px;
      background: var(--red-soft);
      border: 2px solid var(--red);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px var(--red-glow), 0 0 80px rgba(255,45,45,0.1);
    }

    .shield-icon svg { width: 44px; height: 44px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--red-soft);
      border: 1px solid rgba(255,45,45,0.3);
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 100px;
      margin-bottom: 20px;
      animation: fade-up 0.5s 0.15s ease both;
    }

    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      text-align: center;
      margin-bottom: 16px;
      animation: fade-up 0.5s 0.25s ease both;
    }

    h1 span { color: var(--red); }

    .subtitle {
      font-size: 16px; font-weight: 400;
      color: #a0a0a0;
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 36px;
      animation: fade-up 0.5s 0.35s ease both;
    }

    .reason-card {
      background: var(--ink-2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--red);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 440px; width: 100%;
      margin-bottom: 36px;
      animation: fade-up 0.5s 0.45s ease both;
    }

    .reason-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--red); margin-bottom: 8px;
    }

    #reason-text {
      font-size: 14px; color: #d0d0d0; line-height: 1.6;
    }

    .blocked-url {
      font-size: 12px; color: var(--muted);
      font-family: monospace;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      max-width: 440px; width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: -20px; margin-bottom: 36px;
      animation: fade-up 0.5s 0.5s ease both;
    }

    .actions {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      animation: fade-up 0.5s 0.55s ease both;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer; border: none;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      text-decoration: none;
    }

    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: translateY(0);    }

    .btn-safe {
      background: var(--safe);
      color: #000;
      box-shadow: 0 4px 20px rgba(61, 220, 132, 0.3);
    }

    .btn-safe:hover { box-shadow: 0 6px 28px rgba(61, 220, 132, 0.45); }

    .btn-danger {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-danger:hover { color: #f0f0f0; border-color: rgba(255,255,255,0.2); }

    .brand {
      position: fixed; bottom: 24px;
      font-size: 12px; color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      animation: fade-up 0.5s 0.7s ease both;
    }

    .brand strong { color: rgba(255,255,255,0.4); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="badge">
    <span class="badge-dot"></span>
    Threat Detected
  </div>

  <div class="shield-wrap">
    <div class="shield-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff2d2d" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
      </svg>
    </div>
  </div>

  <h1>This site is <span>dangerous</span></h1>

  <p class="subtitle">
    EduSentinel AI has blocked this page to protect you.<br/>
    Visiting it could put your personal information at risk.
  </p>

  <div class="reason-card">
    <div class="reason-label">Why it was blocked</div>
    <div id="reason-text">This website was flagged as a phishing threat.</div>
  </div>

  <div class="blocked-url" id="blocked-url">Loading…</div>

  <div class="actions">
    <button class="btn btn-safe" id="btn-go-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Go Back to Safety
    </button>

    <button class="btn btn-danger" id="btn-proceed">
      Proceed Anyway
    </button>
  </div>

</div>

<div class="brand">Protected by <strong>EduSentinel AI</strong></div>

<!-- ✅ CRITICAL: warning.js first, then brand-ai.js, then redirect-guard.js LAST -->
<script src="warning.js"></script>
<script src="brand-ai.js"></script>
<script src="redirect-guard.js"></script>
</body>
</html>
